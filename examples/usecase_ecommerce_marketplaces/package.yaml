name: usecase-ecommerce-marketplaces
version: "1"
environment: demo
datasets:
  - name: shipping-carriers
    records:
      - id: ups-2day
        name: UPS 2 Day
        facts: {active: true, countries: [US, CA], handling: [fragile], priority: 8, delivery_days: 2, cost: 16.8, on_time: 0.971, fallback_order: 1}
      - id: fedex-ground
        name: FedEx Ground
        facts: {active: true, countries: [US], handling: [fragile], priority: 5, delivery_days: 3, cost: 9.4, on_time: 0.955, fallback_order: 2}
      - id: dhl-express
        name: DHL Express
        facts: {active: true, countries: [US, GB, NP], handling: [fragile], priority: 7, delivery_days: 1, cost: 22.0, on_time: 0.980, fallback_order: 3}
policies:
  - name: checkout
    default_effect: allow
    rules:
      - {id: abuse-block, effect: deny, condition: 'customer.abuse_flag == true', reason: customer is blocked for promotion abuse}
      - {id: high-risk-order, effect: require_review, condition: 'order.risk_score >= 70', reason: checkout risk requires review}
      - {id: high-value-fragile, effect: require_review, condition: 'shipment.fragile == true and order.value > 1000', reason: fragile high-value shipment needs review}
rankings:
  - name: shipping-carrier
    decision: checkout
    dataset: shipping-carriers
    selection: best
    priority_path: provider.priority
    specificity_path: provider.delivery_days
    fallback_path: provider.fallback_order
    cost_path: provider.cost
    rule_set:
      name: shipping-carrier
      rules:
        - {id: active, condition: 'provider.active == true'}
        - {id: country, condition: 'shipment.country in provider.countries'}
        - {id: fragile, condition: 'shipment.fragile == false or "fragile" in provider.handling'}
        - {id: delivery-sla, condition: 'provider.delivery_days <= shipment.max_delivery_days'}
      score_rules:
        - {id: on-time, metric: provider.on_time, weight: 0.45, normalize: {min: 0.90, max: 1}}
        - {id: speed, metric: provider.delivery_days, weight: 0.25, direction: lower_better, normalize: {min: 1, max: 7}}
        - {id: cost, metric: provider.cost, weight: 0.30, direction: lower_better, normalize: {min: 5, max: 40}}
optimizations:
  - name: shipping-selection
    decision: checkout
    ranking: shipping-carrier
    selection: best
    goal: select the lowest-risk carrier that meets delivery promise and cost goals
